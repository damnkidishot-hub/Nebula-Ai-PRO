<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nebula Code AI - Sign in</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="logo"><span class="dot"></span><h1>Nebula Code AI</h1></div>
      <p class="sub">Welcome back. Sign in to continue.</p>

      <label>Username or Email</label>
      <input id="username" type="text" placeholder="you@example.com" autocomplete="username" />

      <label>Password</label>
      <input id="password" type="password" placeholder="••••••••" autocomplete="current-password" />

      <button class="btn" id="loginBtn">Sign in</button>
      <div class="error" id="error"></div>
      <div class="link">No account? <a href="register.html">Create one</a></div>
    </div>
  </div>
  <script src="js/common.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
