<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nebula Code AI - Create account</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="logo"><span class="dot"></span><h1>Nebula Code AI</h1></div>
      <p class="sub">Create your account to get started.</p>

      <label>Display name</label>
      <input id="displayName" type="text" placeholder="Ada Lovelace" />

      <label>Username</label>
      <input id="username" type="text" placeholder="ada" />

      <label>Email (optional)</label>
      <input id="email" type="email" placeholder="ada@example.com" />

      <label>Password</label>
      <input id="password" type="password" placeholder="••••••••" />

      <button class="btn" id="registerBtn">Create account</button>
      <div class="error" id="error"></div>
      <div class="link">Already have an account? <a href="login.html">Sign in</a></div>
    </div>
  </div>
  <script src="js/common.js"></script>
  <script src="js/register.js"></script>
</body>
</html>
